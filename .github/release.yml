changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "🚀 New Features"
      labels: ["enhancement", "feat"]
    - title: "🐛 Bug Fixes"
      labels: ["bug", "fix"]
    - title: "🧪 Tests & Quality"
      labels: ["test", "chore"]
    - title: "📖 Documentation"
      labels: ["documentation", "docs"]
