name: dbt-vitals

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'models/**/*.sql'
      - 'snapshots/**/*.sql'
      - 'seeds/**/*.csv'

jobs:
  dbt-vitals:
    name: Warehouse Impact Report
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # Post PR comments
      contents: read        # Checkout repo

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Full history is required — DiffEngine compares HEAD against the
          # base branch. A shallow clone (default depth=1) will fail the diff.
          fetch-depth: 0

      # ---------------------------------------------------------------------------
      # Download your production dbt manifest.json before running dbt-vitals.
      # Uncomment and adapt ONE of the options below to match your setup.
      # ---------------------------------------------------------------------------

      # Option A: Download from S3 (most common for dbt Core teams)
      # - name: Download manifest from S3
      #   run: aws s3 cp s3://your-bucket/dbt-artifacts/manifest.json ./target/manifest.json
      #   env:
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     AWS_REGION: us-east-1

      # Option B: Download from dbt Cloud artifacts API
      # - name: Download manifest from dbt Cloud
      #   run: |
      #     mkdir -p target
      #     curl -s -H "Authorization: Token ${{ secrets.DBT_CLOUD_API_TOKEN }}" \
      #       "https://cloud.getdbt.com/api/v2/accounts/${{ secrets.DBT_ACCOUNT_ID }}/jobs/${{ secrets.DBT_CLOUD_JOB_ID }}/artifacts/manifest.json" \
      #       -o ./target/manifest.json

      # Option C: Manifest is committed to the repo (not recommended for large teams)
      # No step needed — it will be present after checkout.

      - name: Run dbt-vitals
        uses: ./
        with:
          warehouse-type: snowflake
          snowflake-account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          snowflake-user: ${{ secrets.SNOWFLAKE_USER }}
          snowflake-private-key: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          snowflake-warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          snowflake-database: ${{ secrets.SNOWFLAKE_DATABASE }}
          snowflake-schema: ${{ secrets.SNOWFLAKE_SCHEMA }}
          snowflake-role: ${{ secrets.SNOWFLAKE_ROLE }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          pr-title: ${{ github.event.pull_request.title }}
          # -------------------------------------------------------------------
          # NOTE: the manifest-path below is for dbt-vitals' own CI test only.
          # In your dbt repo, remove this line and uncomment one of the
          # manifest download options above to provide your production manifest.
          # -------------------------------------------------------------------
          manifest-path: ./test-dbt-repo/target/manifest.json
