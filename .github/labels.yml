# Label definitions for dbt-vitals.
# Apply once with: gh label create --force ... or sync with a labeler action.

- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or improvement"

- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"

- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"

- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

- name: "new adapter"
  color: "e4e669"
  description: "New warehouse adapter (BigQuery, Redshift, Databricks, etc.)"

- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"

- name: "skip-changelog"
  color: "ededed"
  description: "Exclude this PR from release notes"
